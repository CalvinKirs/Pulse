[logging]
 default = FILE:/var/log/krb5libs.log
 kdc = FILE:/var/log/krb5kdc.log
 admin_server = FILE:/var/log/kadmind.log

[libdefaults]
 default_realm = HDYH_DEV.COM
 dns_lookup_realm = false
 dns_lookup_kdc = false
 ticket_lifetime = 24h
 renew_lifetime = 7d
 forwardable = true
 kdc_timeout = 3000
 udp_preference_limit = 2

[realms]
 HDYH_DEV.COM = {
  kdc = kerberos.hdyh_dev.com
  admin_server = kerberos.hdyh_dev.com
 }

[domain_realm]
 .hdyh_dev.com = HDYH_DEV.COM
 hdyh_dev.com = HDYH_DEV.COM
